<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supa Oldies Six-A-Side</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Roboto+Condensed:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --prem-purple: #3d185a;
  --prem-sky: #00b2e3;
  --prem-gold: #e8a020;
  --champ-navy: #1a2c6e;
  --champ-sky: #5cb8e8;
  --div1-green: #00703a;
  --div1-amber: #f0a500;
  --div2-red: #c0272d;
  --div2-cream: #f5e6c0;
  --bg: #0e0e12;
  --surface: #16161e;
  --surface2: #1e1e2a;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8e8;
  --muted: #888;
  --win: #2ecc71;
  --draw: #f39c12;
  --loss: #e74c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto Condensed', sans-serif;
  min-height: 100vh;
  font-size: 14px;
}
.site-header {
  background: linear-gradient(135deg, #0a0a10 0%, #1a1a2e 100%);
  border-bottom: 3px solid var(--prem-gold);
  position: relative;
  overflow: hidden;
}
.site-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 18px, rgba(255,255,255,0.015) 18px, rgba(255,255,255,0.015) 19px);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 18px;
  position: relative;
}
.crest { width: 58px; height: 58px; flex-shrink: 0; }
.header-text h1 {
  font-family: 'Teko', sans-serif;
  font-size: 2.4rem;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header-text .strapline {
  font-family: 'Teko', sans-serif;
  font-size: 0.95rem;
  color: var(--prem-gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 2px;
}
.division-bar {
  background: #0a0a10;
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
.division-bar::-webkit-scrollbar { display: none; }
.div-tab {
  flex-shrink: 0;
  padding: 0 26px;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 9px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  font-family: 'Teko', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.div-tab .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.div-tab[data-div="prem"] .dot  { background: var(--prem-sky); }
.div-tab[data-div="champ"] .dot { background: var(--champ-sky); }
.div-tab[data-div="div1"] .dot  { background: var(--div1-amber); }
.div-tab[data-div="div2"] .dot  { background: var(--div2-cream); }
.div-tab[data-div="prem"].active  { color: var(--prem-sky);   border-bottom-color: var(--prem-sky); }
.div-tab[data-div="champ"].active { color: var(--champ-sky);  border-bottom-color: var(--champ-sky); }
.div-tab[data-div="div1"].active  { color: var(--div1-amber); border-bottom-color: var(--div1-amber); }
.div-tab[data-div="div2"].active  { color: var(--div2-cream); border-bottom-color: var(--div2-cream); }
.div-tab:hover:not(.active) { color: var(--text); }
.main-nav-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.main-tabs {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
}
.main-tab {
  padding: 11px 22px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.main-tab.active { color: var(--text); border-bottom-color: var(--prem-gold); }
.main-tab:hover:not(.active) { color: var(--text); }
.content-area { max-width: 1100px; margin: 0 auto; padding: 24px; }
.panel { display: none; }
.panel.active { display: block; }
.div-banner {
  border-radius: 6px 6px 0 0;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.div-banner[data-div="prem"]  { background: linear-gradient(90deg, var(--prem-purple), #5a2080); }
.div-banner[data-div="champ"] { background: linear-gradient(90deg, var(--champ-navy), #2a3c8e); }
.div-banner[data-div="div1"]  { background: linear-gradient(90deg, var(--div1-green), #009050); }
.div-banner[data-div="div2"]  { background: linear-gradient(90deg, var(--div2-red), #e03838); }
.div-banner-title {
  font-family: 'Teko', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
}
.div-banner[data-div="prem"] .div-banner-title  { color: var(--prem-sky); }
.div-banner[data-div="champ"] .div-banner-title { color: var(--champ-sky); }
.div-banner[data-div="div1"] .div-banner-title  { color: var(--div1-amber); }
.div-banner[data-div="div2"] .div-banner-title  { color: var(--div2-cream); }
.div-banner-sub { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-top: 1px; }
.table-wrap {
  overflow-x: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 6px 6px;
  margin-bottom: 28px;
}
table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
thead tr { background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--border); }
thead th {
  padding: 9px 12px;
  text-align: center;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
thead th.th-team { text-align: left; padding-left: 16px; }
tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.03); }
td { padding: 10px 12px; text-align: center; color: var(--text); white-space: nowrap; }
td.td-team { text-align: left; padding-left: 16px; min-width: 160px; }
.team-pos { display: inline-block; width: 22px; color: var(--muted); font-size: 0.78rem; }
.team-name { font-family: 'Roboto Condensed', sans-serif; font-weight: 700; font-size: 0.92rem; }
.pts-cell { font-family: 'Teko', sans-serif; font-size: 1.3rem; font-weight: 600; color: #fff; }
.gd-pos { color: #4cd964; }
.gd-neg { color: #ff4a4a; }
.gd-zero { color: var(--muted); }
.form-row { display: flex; gap: 3px; justify-content: center; align-items: center; }
.form-pip {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 700; font-family: 'Roboto', sans-serif;
  color: #fff; flex-shrink: 0;
}
.form-pip.W { background: var(--win); }
.form-pip.D { background: var(--draw); }
.form-pip.L { background: var(--loss); }
.form-pip.blank { background: rgba(255,255,255,0.08); color: transparent; }
.form-legend {
  display: flex; gap: 14px; align-items: center;
  padding: 10px 16px; font-size: 0.72rem; color: var(--muted); letter-spacing: 1px;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; }
.results-list { display: flex; flex-direction: column; gap: 8px; }
.result-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  display: flex;
  align-items: center;
  padding: 10px 16px;
  gap: 12px;
  animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.res-div-badge {
  font-family: 'Teko', sans-serif;
  font-size: 0.7rem; letter-spacing: 1px;
  padding: 2px 8px; border-radius: 3px;
  text-transform: uppercase; flex-shrink: 0;
  min-width: 60px; text-align: center;
}
.res-div-badge[data-div="prem"]  { background: var(--prem-purple);  color: var(--prem-sky); }
.res-div-badge[data-div="champ"] { background: var(--champ-navy);   color: var(--champ-sky); }
.res-div-badge[data-div="div1"]  { background: var(--div1-green);   color: var(--div1-amber); }
.res-div-badge[data-div="div2"]  { background: var(--div2-red);     color: var(--div2-cream); }
.res-teams { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
.res-team { flex: 1; font-weight: 700; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.res-team.home { text-align: right; }
.res-team.away { text-align: left; }
.res-score {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 14px; font-family: 'Teko', sans-serif; font-size: 1.3rem; color: #fff;
  white-space: nowrap; flex-shrink: 0;
}
.res-date { color: var(--muted); font-size: 0.72rem; flex-shrink: 0; }
.btn-del {
  background: none; border: 1px solid rgba(231,76,60,0.3); color: var(--loss);
  border-radius: 3px; padding: 4px 10px; cursor: pointer; font-size: 0.7rem;
  font-family: 'Roboto Condensed', sans-serif; letter-spacing: 1px; transition: all 0.15s; flex-shrink: 0;
}
.btn-del:hover { background: rgba(231,76,60,0.15); }
.results-empty { text-align: center; padding: 40px; color: var(--muted); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
.mw-group { margin-bottom: 24px; }
.mw-heading {
  font-family: 'Teko', sans-serif;
  font-size: 1rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--prem-gold);
  padding: 6px 0 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 700px) { .admin-grid { grid-template-columns: 1fr; } }
.admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
.admin-card h3 { font-family: 'Teko', sans-serif; font-size: 1.15rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; color: var(--prem-gold); }
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 700; }
input, select {
  background: var(--bg); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
  color: var(--text); padding: 9px 11px; font-family: 'Roboto Condensed', sans-serif;
  font-size: 0.9rem; outline: none; transition: border-color 0.15s; width: 100%;
}
input:focus, select:focus { border-color: var(--prem-gold); }
select option { background: #1a1a2e; }
.score-row { display: flex; align-items: flex-end; gap: 10px; }
.score-row .form-group { flex: 1; }
.vs-label { padding-bottom: 11px; color: var(--muted); font-family: 'Teko', sans-serif; font-size: 1rem; letter-spacing: 1px; flex-shrink: 0; }
input[type="number"] { text-align: center; }
.btn {
  width: 100%; background: var(--prem-gold); color: #000; border: none; border-radius: 4px;
  padding: 11px; font-family: 'Teko', sans-serif; font-size: 1.05rem; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 4px;
}
.btn:hover { background: #d4901c; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.add-team-row { display: flex; gap: 8px; margin-bottom: 14px; }
.add-team-row input { flex: 1; margin: 0; }
.btn-sm {
  background: var(--prem-gold); color: #000; border: none; border-radius: 4px;
  padding: 0 16px; font-family: 'Teko', sans-serif; font-size: 0.95rem;
  letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
}
.btn-sm:hover { background: #d4901c; }
.div-team-group { margin-bottom: 14px; }
.div-team-group-label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
.team-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.team-chip {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 10px 4px 12px; display: flex; align-items: center; gap: 8px;
  font-size: 0.82rem; font-weight: 700; animation: fadeUp 0.2s ease;
}
.team-chip button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0; transition: color 0.15s; }
.team-chip button:hover { color: var(--loss); }
.no-teams { color: var(--muted); font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }
.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
.login-wrap {
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 36px 32px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}
.login-icon { font-size: 2rem; margin-bottom: 12px; }
.login-title {
  font-family: 'Teko', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--prem-gold);
  margin-bottom: 4px;
}
.login-sub {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 24px;
}
.login-error {
  color: var(--loss);
  font-size: 0.78rem;
  letter-spacing: 1px;
  margin-bottom: 12px;
  margin-top: -8px;
}
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--prem-gold); color: #000;
  font-family: 'Teko', sans-serif; font-size: 1rem; letter-spacing: 2px;
  padding: 10px 24px; border-radius: 4px; font-weight: 600;
  transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  z-index: 9999; pointer-events: none; text-transform: uppercase;
}
.toast.show { transform: translateX(-50%) translateY(0); }
#loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9998; flex-direction: column; gap: 16px;
}
.loading-spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--prem-gold);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Teko', sans-serif; font-size: 1rem;
  letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
}
@media (max-width: 600px) {
  .header-text h1 { font-size: 1.8rem; }
  .content-area { padding: 14px; }
  .res-date { display: none; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <svg class="crest" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4 L58 16 L58 36 C58 50 46 60 32 62 C18 60 6 50 6 36 L6 16 Z" fill="#1a1a2e" stroke="#e8a020" stroke-width="2"/>
      <circle cx="32" cy="34" r="14" stroke="#00b2e3" stroke-width="1.5" fill="none"/>
      <line x1="32" y1="20" x2="32" y2="48" stroke="#00b2e3" stroke-width="1"/>
      <line x1="18" y1="34" x2="46" y2="34" stroke="#00b2e3" stroke-width="1"/>
      <ellipse cx="32" cy="34" rx="6" ry="14" stroke="#00b2e3" stroke-width="1" fill="none"/>
      <path d="M22 22 Q32 28 42 22" stroke="#00b2e3" stroke-width="1" fill="none"/>
      <path d="M22 46 Q32 40 42 46" stroke="#00b2e3" stroke-width="1" fill="none"/>
      <circle cx="32" cy="34" r="3" fill="#e8a020"/>
      <path d="M32 8 L36 14 L32 12 L28 14 Z" fill="#e8a020"/>
    </svg>
    <div class="header-text">
      <h1>Supa Oldies</h1>
      <div class="strapline">Six-A-Side</div>
    </div>
  </div>
</header>

<div class="division-bar">
  <button class="div-tab active" data-div="prem"  onclick="setDiv('prem',this)"><span class="dot"></span>Premier League</button>
  <button class="div-tab"        data-div="champ" onclick="setDiv('champ',this)"><span class="dot"></span>Championship</button>
  <button class="div-tab"        data-div="div1"  onclick="setDiv('div1',this)"><span class="dot"></span>Division One</button>
  <button class="div-tab"        data-div="div2"  onclick="setDiv('div2',this)"><span class="dot"></span>Division Two</button>
</div>

<div class="main-nav-bar">
  <div class="main-tabs">
    <button class="main-tab active" onclick="setMainTab('table',this)">Table</button>
    <button class="main-tab"        onclick="setMainTab('results',this)">Results</button>
    <button class="main-tab"        id="admin-tab" onclick="adminTabClick(this)">Admin</button>
  </div>
</div>

<div class="content-area">
  <div class="panel active" id="panel-table"></div>
  <div class="panel"        id="panel-results"></div>
  <div class="panel"        id="panel-login">
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-icon">🔒</div>
        <div class="login-title">Admin Access</div>
        <div class="login-sub">Enter password to continue</div>
        <div class="form-group" style="margin-bottom:16px">
          <label>Password</label>
          <input type="password" id="admin-password-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
        </div>
        <div id="login-error" class="login-error" style="display:none">Incorrect password</div>
        <button class="btn" onclick="checkPassword()">Unlock Admin</button>
      </div>
    </div>
  </div>
  <div class="panel"        id="panel-admin">
    <div class="admin-grid">
      <div class="admin-card">
        <h3>Manage Teams</h3>
        <div class="form-group">
          <label>Division</label>
          <select id="team-div-select">
            <option value="prem">Premier League</option>
            <option value="champ">Championship</option>
            <option value="div1">Division One</option>
            <option value="div2">Division Two</option>
          </select>
        </div>
        <div class="add-team-row">
          <input type="text" id="new-team-input" placeholder="Team name..." maxlength="30">
          <button class="btn-sm" onclick="addTeam()">ADD</button>
        </div>
        <div id="teams-by-div"></div>
      </div>
      <div class="admin-card">
        <h3>Record Result</h3>
        <div class="form-group">
          <label>Division</label>
          <select id="result-div-select" onchange="refreshResultSelects()">
            <option value="prem">Premier League</option>
            <option value="champ">Championship</option>
            <option value="div1">Division One</option>
            <option value="div2">Division Two</option>
          </select>
        </div>
        <div class="score-row">
          <div class="form-group"><label>Home Team</label><select id="home-team"></select></div>
          <div class="vs-label">VS</div>
          <div class="form-group"><label>Away Team</label><select id="away-team"></select></div>
        </div>
        <div class="score-row" style="justify-content:center;gap:20px;margin:10px 0 16px">
          <div class="form-group" style="max-width:90px"><label>Home Goals</label><input type="number" id="home-goals" min="0" max="99" value="0"></div>
          <div class="vs-label">–</div>
          <div class="form-group" style="max-width:90px"><label>Away Goals</label><input type="number" id="away-goals" min="0" max="99" value="0"></div>
        </div>
        <div class="form-group">
          <label>Match Week</label>
          <input type="number" id="match-week" min="1" max="99" placeholder="e.g. 1" style="text-align:left">
        </div>
        <button class="btn" onclick="recordResult()">Save Result</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="loading-overlay">
  <div class="loading-inner">
    <div class="loading-spinner"></div>
    <div class="loading-text">Connecting...</div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRCUKdfu0HJ2wtMu_8TZnwxR74TNfySoo",
  authDomain: "supa-oldies.firebaseapp.com",
  databaseURL: "https://supa-oldies-default-rtdb.firebaseio.com",
  projectId: "supa-oldies",
  storageBucket: "supa-oldies.firebasestorage.app",
  messagingSenderId: "665959030561",
  appId: "1:665959030561:web:d84b7097fc0146ee57e860"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── CONFIG ────────────────────────────────────────────────────────
const DIVS = {
  prem:  { label:'Premier League', short:'PL' },
  champ: { label:'Championship',   short:'CH' },
  div1:  { label:'Division One',   short:'D1' },
  div2:  { label:'Division Two',   short:'D2' },
};

let state = { teams:{ prem:[], champ:[], div1:[], div2:[] }, results:{} };
let currentDiv = 'prem';
let currentMainTab = 'table';
let adminUnlocked = false;

// ── LOADING OVERLAY ───────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none';
}

// ── FIREBASE SYNC ─────────────────────────────────────────────────
// Listen for real-time updates — re-render whenever data changes
onValue(ref(db, 'state'), (snapshot) => {
  const data = snapshot.val();
  if (data) {
    state.teams   = data.teams   || { prem:[], champ:[], div1:[], div2:[] };
    state.results = data.results || {};
  } else {
    state = { teams:{ prem:[], champ:[], div1:[], div2:[] }, results:{} };
  }
  setLoading(false);
  render();
  if (currentMainTab === 'admin') { renderTeamsList(); refreshResultSelects(); }
});

function saveTeams() {
  set(ref(db, 'state/teams'), state.teams);
}

function pushResult(result) {
  push(ref(db, 'state/results'), result);
}

function deleteResultFromDB(key) {
  remove(ref(db, 'state/results/' + key));
}

// ── RESULTS as array helper ───────────────────────────────────────
function resultsArray() {
  if (!state.results) return [];
  return Object.entries(state.results).map(([key, val]) => ({ ...val, _key: key }));
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── ADMIN LOGIN ───────────────────────────────────────────────────
window.adminTabClick = function(el) {
  if (adminUnlocked) {
    setMainTab('admin', el);
  } else {
    currentMainTab = 'login';
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-login').classList.add('active');
    document.getElementById('admin-password-input').value = '';
    document.getElementById('login-error').style.display = 'none';
    setTimeout(() => document.getElementById('admin-password-input').focus(), 50);
  }
};

window.checkPassword = function() {
  const val = document.getElementById('admin-password-input').value;
  if (val === 'sup@oldie5') {
    adminUnlocked = true;
    document.getElementById('login-error').style.display = 'none';
    setMainTab('admin', document.getElementById('admin-tab'));
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('admin-password-input').value = '';
    document.getElementById('admin-password-input').focus();
  }
};

// ── TABS ──────────────────────────────────────────────────────────
window.setDiv = function(div, el) {
  currentDiv = div;
  document.querySelectorAll('.div-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('team-div-select').value = div;
  document.getElementById('result-div-select').value = div;
  refreshResultSelects();
  render();
};

function setMainTab(tab, el) {
  currentMainTab = tab;
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  render();
}
window.setMainTab = setMainTab;

// ── TEAMS ─────────────────────────────────────────────────────────
window.addTeam = function() {
  const div  = document.getElementById('team-div-select').value;
  const name = document.getElementById('new-team-input').value.trim();
  if (!name) return;
  const all = Object.values(state.teams).flat();
  if (all.find(t => t.toLowerCase() === name.toLowerCase())) { toast('TEAM ALREADY EXISTS'); return; }
  if (!Array.isArray(state.teams[div])) state.teams[div] = [];
  state.teams[div].push(name);
  saveTeams();
  document.getElementById('new-team-input').value = '';
  toast('TEAM ADDED');
};

window.removeTeam = function(name) {
  if (!confirm('Remove "' + name + '" and all their results?')) return;
  for (const d in state.teams) state.teams[d] = state.teams[d].filter(t => t !== name);
  saveTeams();
  // Delete their results from Firebase
  const toDelete = resultsArray().filter(r => r.home === name || r.away === name);
  toDelete.forEach(r => deleteResultFromDB(r._key));
  toast('TEAM REMOVED');
};

function renderTeamsList() {
  const c = document.getElementById('teams-by-div');
  c.innerHTML = ['prem','champ','div1','div2'].map(div => `
    <div class="div-team-group">
      <div class="div-team-group-label">${DIVS[div].label}</div>
      <div class="team-chips">
        ${(state.teams[div]||[]).length
          ? (state.teams[div]||[]).map(t => `<div class="team-chip">${esc(t)}<button onclick="removeTeam('${esc(t)}')" title="Remove">✕</button></div>`).join('')
          : '<span class="no-teams">None</span>'}
      </div>
    </div>`).join('');
}

function refreshResultSelects() {
  const div   = document.getElementById('result-div-select').value;
  const teams = state.teams[div] || [];
  ['home-team','away-team'].forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = teams.length
      ? teams.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('')
      : '<option value="">— add teams first —</option>';
    if (teams.includes(cur)) sel.value = cur;
  });
}
window.refreshResultSelects = refreshResultSelects;

// ── RESULTS ───────────────────────────────────────────────────────
window.recordResult = function() {
  const div  = document.getElementById('result-div-select').value;
  const home = document.getElementById('home-team').value;
  const away = document.getElementById('away-team').value;
  const hg   = parseInt(document.getElementById('home-goals').value) || 0;
  const ag   = parseInt(document.getElementById('away-goals').value) || 0;
  const mw   = parseInt(document.getElementById('match-week').value) || null;
  if (!home || !away) { toast('SELECT BOTH TEAMS'); return; }
  if (home === away)  { toast('SAME TEAM SELECTED'); return; }
  pushResult({ div, home, away, hg, ag, matchWeek: mw, date: new Date().toLocaleDateString('en-GB') });
  document.getElementById('home-goals').value = 0;
  document.getElementById('away-goals').value = 0;
  document.getElementById('match-week').value = '';
  toast('RESULT SAVED');
};

window.deleteResult = function(key) {
  if (!confirm('Delete this result?')) return;
  deleteResultFromDB(key);
  toast('DELETED');
};

// ── STATS ─────────────────────────────────────────────────────────
function calcTable(div) {
  const tbl = {};
  (state.teams[div] || []).forEach(t => { tbl[t] = { name:t, p:0, w:0, d:0, l:0, gf:0, ga:0 }; });
  resultsArray().filter(r => r.div === div).forEach(r => {
    if (!tbl[r.home] || !tbl[r.away]) return;
    const h = tbl[r.home], a = tbl[r.away];
    h.p++; a.p++; h.gf += r.hg; h.ga += r.ag; a.gf += r.ag; a.ga += r.hg;
    if (r.hg > r.ag)      { h.w++; a.l++; }
    else if (r.hg < r.ag) { a.w++; h.l++; }
    else                  { h.d++; a.d++; }
  });
  return Object.values(tbl)
    .map(t => ({ ...t, gd: t.gf - t.ga, pts: t.w * 3 + t.d }))
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name));
}

function getForm(team, div) {
  const divR  = resultsArray().filter(r => r.div === div && (r.home === team || r.away === team));
  const last5 = divR.slice(-5).map(r => {
    const isHome = r.home === team;
    const s = isHome ? r.hg : r.ag, c = isHome ? r.ag : r.hg;
    return s > c ? 'W' : s < c ? 'L' : 'D';
  });
  while (last5.length < 5) last5.unshift('blank');
  return last5;
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  if (currentMainTab === 'table')   renderTable();
  if (currentMainTab === 'results') renderResults();
  if (currentMainTab === 'admin')   { renderTeamsList(); refreshResultSelects(); }
}

function renderTable() {
  const rows   = calcTable(currentDiv);
  const c      = document.getElementById('panel-table');
  const medals = ['🥇','🥈','🥉'];
  if (!(state.teams[currentDiv] || []).length) {
    c.innerHTML = `<div class="div-banner" data-div="${currentDiv}"><div><div class="div-banner-title">${DIVS[currentDiv].label}</div><div class="div-banner-sub">Six-A-Side</div></div></div><div class="table-wrap"><div class="empty-state">No teams yet — add teams in Admin</div></div>`;
    return;
  }
  c.innerHTML = `
    <div class="div-banner" data-div="${currentDiv}">
      <div><div class="div-banner-title">${DIVS[currentDiv].label}</div><div class="div-banner-sub">Six-A-Side</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="th-team">Team</th>
          <th title="Played">P</th><th title="Won">W</th><th title="Drawn">D</th><th title="Lost">L</th>
          <th title="Goals For">GF</th><th title="Goals Against">GA</th><th title="Goal Difference">GD</th>
          <th title="Points">Pts</th><th title="Last 5 games">Form</th>
        </tr></thead>
        <tbody>
          ${rows.map((t, i) => {
            const form    = getForm(t.name, currentDiv);
            const gdClass = t.gd > 0 ? 'gd-pos' : t.gd < 0 ? 'gd-neg' : 'gd-zero';
            const gdStr   = t.gd > 0 ? '+' + t.gd : t.gd;
            const formHTML = form.map(f => `<div class="form-pip ${f}">${f === 'blank' ? '' : f}</div>`).join('');
            const prefix  = i < 3 ? `<span style="margin-right:4px">${medals[i]}</span>` : '';
            return `<tr>
              <td class="td-team"><span class="team-pos">${i+1}</span>${prefix}<span class="team-name">${esc(t.name)}</span></td>
              <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
              <td>${t.gf}</td><td>${t.ga}</td>
              <td class="${gdClass}">${gdStr}</td>
              <td class="pts-cell">${t.pts}</td>
              <td><div class="form-row">${formHTML}</div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div class="form-legend">
        <span>Form (last 5):</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--win)"></span>Win</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--draw)"></span>Draw</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--loss)"></span>Loss</span>
      </div>
    </div>`;
}

function renderResults() {
  const divR = resultsArray().filter(r => r.div === currentDiv);
  const c    = document.getElementById('panel-results');
  if (!divR.length) {
    c.innerHTML = `<div class="results-empty">No results recorded for ${DIVS[currentDiv].label}</div>`;
    return;
  }
  const grouped = {};
  [...divR].reverse().forEach(r => {
    const key = r.matchWeek != null ? 'Week ' + r.matchWeek : 'No Match Week';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });
  const sortedKeys = Object.keys(grouped).sort((a, b) => {
    const na = parseInt(a), nb = parseInt(b);
    if (!isNaN(na) && !isNaN(nb)) return nb - na;
    if (!isNaN(na)) return -1;
    if (!isNaN(nb)) return 1;
    return 0;
  });
  c.innerHTML = sortedKeys.map(key => `
    <div class="mw-group">
      <div class="mw-heading">${key}</div>
      <div class="results-list">
        ${grouped[key].map(r => `
          <div class="result-row">
            <span class="res-div-badge" data-div="${r.div}">${DIVS[r.div].short}</span>
            <div class="res-teams">
              <div class="res-team home">${esc(r.home)}</div>
              <div class="res-score">${r.hg} – ${r.ag}</div>
              <div class="res-team away">${esc(r.away)}</div>
            </div>
            <span class="res-date">${r.date}</span>
            <button class="btn-del" onclick="deleteResult('${r._key}')">DEL</button>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.getElementById('new-team-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.addTeam(); });
document.getElementById('admin-password-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.checkPassword(); });

// Show loading until Firebase responds
setLoading(true);
</script>
</body>
</html>
